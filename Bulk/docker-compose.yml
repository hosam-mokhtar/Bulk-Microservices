
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - SA_PASSWORD=Bulk@123
      - ACCEPT_EULA=Y
    ports:
      - "5433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Bulk@123 -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  authenticationservice:
    image: ${DOCKER_REGISTRY-}authenticationservice
    build:
      context: .
      dockerfile: src/AuthenticationService/Dockerfile
    depends_on:
      - sqlserver

  workoutservice:
    image: ${DOCKER_REGISTRY-}workoutservice
    build:
      context: .
      dockerfile: src/WorkoutService/Dockerfile
    depends_on:
      - sqlserver

  userprofileservice:
    image: ${DOCKER_REGISTRY-}userprofileservice
    build:
      context: .
      dockerfile: src/UserProfileService/Dockerfile
    depends_on:
      - sqlserver

  fceservice:
    image: ${DOCKER_REGISTRY-}fceservice
    build:
      context: .
      dockerfile: src/FCEService/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sql_data: