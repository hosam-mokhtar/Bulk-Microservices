version: "3.9"

services:

   sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - SA_PASSWORD=Bulk@123 
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Bulk@123 -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
             
  # ==========================================
  # 2. authenticationservice Service 
  # ==========================================
   authenticationservice:
    image: ${DOCKER_REGISTRY-}authenticationservice
    build:
      context: .
      dockerfile: src/AuthenticationService/Dockerfile
    depends_on:
     sqlserver:
        condition: service_healthy
      
  # ==========================================
  # 2. workoutservice Service 
  # ==========================================
   workoutservice:
    image: ${DOCKER_REGISTRY-}workoutservice
    build:
      context: .
      dockerfile: src/WorkoutService/Dockerfile
    depends_on:
     sqlserver:
        condition: service_healthy

  # ==========================================
  # 3. userprofileservice Service 
  # ==========================================
   userprofileservice:
    image: ${DOCKER_REGISTRY-}userprofileservice
    build:
      context: .
      dockerfile: src/UserProfileService/Dockerfile
    depends_on:
     sqlserver:
        condition: service_healthy

volumes:        
  sql_data: