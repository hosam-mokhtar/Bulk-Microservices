version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - SA_PASSWORD=Bulk@123
      - ACCEPT_EULA=Y
    ports:
      - "5433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Bulk@123 -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"     
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  authenticationservice:
    image: ${DOCKER_REGISTRY-}authenticationservice
    build:
      context: .
      dockerfile: src/AuthenticationService/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy

  workoutservice:
    image: ${DOCKER_REGISTRY-}workoutservice
    build:
      context: .
      dockerfile: src/WorkoutService/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy

  userprofileservice:
    image: ${DOCKER_REGISTRY-}userprofileservice
    build:
      context: .
      dockerfile: src/UserProfileService/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy

  fceservice:
    image: ${DOCKER_REGISTRY-}fceservice
    build:
      context: .
      dockerfile: src/FCEService/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sql_data:
  rabbitmq_data:
