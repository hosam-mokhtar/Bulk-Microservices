version: "3.9"

services:
   sqlserver:
     environment:
       - MSSQL_SA_PASSWORD=Bulk@123
       - ACCEPT_EULA=Y
     ports:
       - "1433:1433"
     healthcheck:
       test:
        [
         "CMD-SHELL",
         "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Bulk@123' -C -Q 'SELECT 1'"
        ]
       interval: 10s
       timeout: 5s
       retries: 10
       start_period: 30s
     volumes:
       - sql_data:/var/opt/mssql
#######################################################################
   authenticationservice:
     environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
     ports:
      - "8080:8080"
      - "8081:8081"
     volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

   workoutservice:
     environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
     ports:
      - "8082:8080"
      - "8083:8081"
     volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

   userprofileservice:
     environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=UserProfileDb;User Id=sa;Password=Bulk@123;TrustServerCertificate=True;
     ports:
      - "8086:8080"
      - "8087:8081"
     volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

   fceservice:
     environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Password=password
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/home/app/.aspnet/https/fceservice.pfx
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=FCEServiceDb;User Id=sa;Password=Bulk@123;MultipleActiveResultSets=true;TrustServerCertificate=True
     ports:
      - "8084:8080"
      - "8085:8081"
     volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

volumes:
  sql_data:
