# ======================================================================
# Discovered Services:

services:
   sql-server:
     environment:
      - SA_PASSWORD=Bulk@123
      - ACCEPT_EULA=Y
     ports:
      - "1433:1433"
     healthcheck:
       test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Bulk@123 -Q 'SELECT 1'"]
       interval: 10s
       timeout: 5s
       retries: 10
       start_period: 20s
     volumes:
        - sql_data:/var/opt/mssql

# 1. Auth Service        - Port HTTP 7070:8080 ---- HTTPS 7071:8081
# ======================================================================
   authenticationservice:
     environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
     ports:
      - "7070:8080"
      - "7071:8081"
     volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

  # ==========================================
  # 1. Workout Service (8080, 8081)
  # ==========================================
   workoutservice:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro


volumes:
     sql_data: